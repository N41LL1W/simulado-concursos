<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulado de Provas - ACS</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; background-color: #f4f4f9; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        h1 { text-align: center; }
        .menu-busca { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        select, button { padding: 10px; font-size: 16px; border-radius: 4px; border: 1px solid #ccc; }
        button { background-color: #28a745; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background-color: #218838; }
        .questao { background: #fafafa; padding: 15px; margin-bottom: 15px; border-left: 5px solid #007bff; border-radius: 4px; }
        .enunciado { font-weight: bold; margin-bottom: 10px; }
        /* Garante que as imagens do seu PDF apareçam no tamanho correto */
        .questao-imagem { max-width: 100%; height: auto; display: block; margin: 10px 0; border: 1px solid #ddd; padding: 5px; background: #fff; }
        .alternativas { list-style: none; padding: 0; }
        .alternativas li { margin-bottom: 8px; }
        #resultado { font-size: 20px; font-weight: bold; color: #28a745; text-align: center; margin-top: 20px; padding: 15px; background: #e2f0d9; border-radius: 4px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 Simulado de Concursos</h1>
    
    <div class="menu-busca">
        <select id="seletor-prova">
            <option value="dados/provas/2016_vunesp_acs_sertaozinho.json">Sertãozinho 2016 - ACS (Vunesp Original)</option>
            <option value="dados/provas/questoes_sertaozinho_2016_acs.json">Sertãozinho 2016 - ACS (Opção 2)</option>
        </select>
        <button onclick="carregarSimulado()">Carregar Prova</button>
    </div>

    <div id="conteudo-prova"></div>
    
    <div id="area-botao" class="hidden" style="text-align: center; margin-top: 20px;">
        <button onclick="corrigirProva()" style="background-color: #007bff; padding: 12px 30px;">Corrigir Respostas</button>
    </div>

    <div id="resultado" class="hidden"></div>
</div>

<script>
    let gabarito = {};
    let total = 0;

    async function carregarSimulado() {
        const arquivo = document.getElementById('seletor-prova').value;
        const conteudo = document.getElementById('conteudo-prova');
        const botaoCorrigir = document.getElementById('area-botao');
        document.getElementById('resultado').classList.add('hidden');
        
        conteudo.innerHTML = "<p>Buscando questões do simulado...</p>";

        try {
            const resposta = await fetch(arquivo);
            const dados = await resposta.json();
            
            gabarito = {}; 
            total = dados.total_questoes || dados.questoes.length;
            conteudo.innerHTML = "";

            dados.questoes.forEach(q => {
                // Guarda a resposta para a correção posterior
                gabarito[q.numero] = q.resposta_correta;

                const divQuestao = document.createElement('div');
                divQuestao.className = 'questao';

                // Enunciado
                const pEnunciado = document.createElement('p');
                pEnunciado.className = 'enunciado';
                pEnunciado.innerText = `${q.numero}. ${q.enunciado}`;
                divQuestao.appendChild(pEnunciado);

                // TRATAMENTO DE IMAGEM: Se o JSON contiver o caminho da imagem, renderiza a tag correspondente
                if (q.imagem || q.img) {
                    const imgTag = document.createElement('img');
                    imgTag.src = q.imagem || q.img;
                    imgTag.className = 'questao-imagem';
                    divQuestao.appendChild(imgTag);
                }

                // Alternativas
                const ulAlt = document.createElement('ul');
                ulAlt.className = 'alternativas';

                Object.keys(q.alternativas).forEach(letra => {
                    const li = document.createElement('li');
                    li.innerHTML = `
                        <label>
                            <input type="radio" name="q-${q.numero}" value="${letra}">
                            <strong>${letra})</strong> ${q.alternativas[letra]}
                        </label>
                    `;
                    ulAlt.appendChild(li);
                });

                divQuestao.appendChild(ulAlt);
                conteudo.appendChild(divQuestao);
            });

            botaoCorrigir.classList.remove('hidden');

        } catch (erro) {
            conteudo.innerHTML = "<p style='color:red;'>Erro ao carregar o arquivo da prova. Certifique-se de que ele existe na pasta correta.</p>";
            botaoCorrigir.classList.add('hidden');
        }
    }

    function corrigirProva() {
        let acertos = 0;
        for (let i = 1; i <= total; i++) {
            const selecionada = document.querySelector(`input[name="q-${i}"]:checked`);
            if (selecionada && selecionada.value === gabarito[i]) {
                acertos++;
            }
        }
        const divResultado = document.getElementById('resultado');
        divResultado.innerHTML = `🎯 Fim do Simulado! Você acertou ${acertos} de ${total} questões.`;
        divResultado.classList.remove('hidden');
        divResultado.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
